<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Codex</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: rgba(255, 255, 255, 0.7);
            --apple-accent: #fa243c; 
            --apple-text: #1d1d1f;
            --header-height: 80px; /* Increased Height */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            -webkit-font-smoothing: antialiased;
        }

        /* Enhanced Navigation */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
            padding: 0 10%; /* Wider side padding */
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-weight: 700; /* Bolder */
            font-size: 32px; /* Increased Font Size */
            letter-spacing: -0.04em; /* Tight Apple-style spacing */
            text-decoration: none;
            color: var(--apple-text);
            display: flex;
            align-items: center;
        }

        .nav-logo span {
            color: var(--apple-accent);
            margin-left: 2px;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            font-size: 14px; /* Slightly larger links */
            font-weight: 500;
            color: rgba(0,0,0,0.8);
            text-decoration: none;
            margin-left: 35px;
            letter-spacing: -0.01em;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--apple-accent);
        }

        /* Container adjustment for taller header */
        main {
            padding-top: 40px;
            min-height: calc(100vh - var(--header-height));
            width: 90%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Existing utility classes */
        .glass-card {
            background: var(--apple-card);
            backdrop-filter: blur(20px);
            border-radius: 22px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.4);
        }

        .btn-primary {
            background-color: var(--apple-accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Kernel<span>Codex</span></a>
        
        <div class="nav-links">
            <a href="/view">Browse</a>
            <a href="/search">Search</a>
            <a href="/chat">AI Assistant</a>
            {% if session.get('user_id') %}
                <a href="/logout">Sign Out</a>
            {% else %}
                <a href="/login">Sign In</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 60px 0; font-size: 12px; color: #86868b;">
        &copy; 2026 Kernel Six | K.R. Mangalam University
    </footer>
</body>
</html>
